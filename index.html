<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mohammad Almeqdadi — Projects</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f1ea;
        color: #17221c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(760px, 100%);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #49705b;
        font-size: 0.78rem;
        font-weight: 750;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 9vw, 6rem);
        font-weight: 500;
        letter-spacing: -0.055em;
        line-height: 0.92;
      }

      .intro {
        max-width: 55ch;
        margin: 28px 0 48px;
        color: #526159;
        font-size: 1.05rem;
        line-height: 1.65;
      }

      .project {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 24px;
        align-items: center;
        padding: 24px 0;
        border-top: 1px solid #b9c2bc;
        color: inherit;
        text-decoration: none;
      }

      .project:last-child { border-bottom: 1px solid #b9c2bc; }
      .project:hover .arrow { transform: translateX(5px); }
      .project h2 { margin: 0 0 6px; font-size: 1.25rem; }
      .project p { margin: 0; color: #657269; }
      .arrow { font-size: 1.5rem; transition: transform 160ms ease; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Mohammad Almeqdadi, MD</p>
      <h1>Projects in progress.</h1>
      <p class="intro">
        A growing collection of creative technology, medical tools, simulations,
        and design experiments. The full project dashboard is coming soon.
      </p>

      <a class="project" href="./liver-simulator/">
        <span>
          <h2>Liver Simulator</h2>
          <p>Explore patterns of liver injury and their response to intervention.</p>
        </span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    </main>
  </body>
</html>
